name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install flake8 flake8-pyproject pytest pytest-cov

      - name: Flake8
        run: flake8 .

      - name: Pytest
        run: pytest --cov=banking --cov-fail-under=85
