[tool.black]
line-length = 120
target-version = ['py38']

[tool.flake8]
max-line-length = 120
exclude = [".venv", "venv", "tests/"]

[tool.pytest]
minversion = "9.0"
addopts = ["-ra", "-s"]
testpaths = [ "tests" ]
log_cli = true
log_cli_level = "INFO"
log_format = "%(asctime)s %(levelname)s %(message)s"